<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BizDeedz Mission Control</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070c16;
        --panel: #0e1828;
        --panel-2: #122038;
        --line: #273a58;
        --text: #dbe8ff;
        --muted: #8ea7d3;
        --accent: #4f93ff;
        --good: #28c58f;
        --warn: #f2b84f;
        --risk: #f06f86;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top right, #1a3056, #070c16 38%);
        color: var(--text);
      }
      .mission-control-layout {
        display: grid;
        grid-template-columns: 240px 1fr 330px;
        grid-template-rows: 70px 1fr auto;
        height: 100vh;
      }
      .sidebar {
        grid-row: 1 / 4;
        background: rgba(5, 9, 17, 0.88);
        border-right: 1px solid var(--line);
        padding: 16px;
      }
      .brand { font-size: 13px; letter-spacing: 0.12em; color: #95b9ff; margin-bottom: 16px; font-weight: 700; }
      .nav-link {
        padding: 10px;
        border: 1px solid transparent;
        border-radius: 10px;
        color: var(--muted);
        margin-bottom: 7px;
      }
      .nav-link.active, .nav-link:hover { color: var(--text); border-color: var(--line); background: var(--panel); }

      .top-timeline-bar {
        grid-column: 2 / 4;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        padding: 10px 14px;
        background: rgba(10, 16, 30, 0.82);
        gap: 10px;
      }
      .timeline-label { min-width: 155px; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .09em; }
      .stage-track { display: grid; grid-template-columns: repeat(6, minmax(110px, 1fr)); gap: 8px; width: 100%; }
      .stage-slot {
        border: 1px solid var(--line);
        border-radius: 10px;
        min-height: 42px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        background: #101a2c;
      }
      .stage-slot.drag-over { border-color: var(--accent); color: #bad3ff; }

      .main-engagement-board {
        grid-column: 2;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        overflow: hidden;
      }
      .metric-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 12px; border-bottom: 1px solid var(--line); }
      .metric-card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px; }
      .metric-card .label { color: var(--muted); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
      .metric-card .value { font-size: 23px; font-weight: 700; margin-top: 2px; }

      .board-header { padding: 12px; color: var(--muted); font-size: 13px; border-bottom: 1px solid var(--line); }
      .engagement-board { padding: 12px; overflow: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 10px; }
      .engagement-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: linear-gradient(135deg, #0f1a2d, #13243c);
        padding: 11px;
        cursor: pointer;
      }
      .engagement-card:hover { border-color: #3f5e89; }
      .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
      .muted { color: var(--muted); font-size: 12px; }
      .health { padding: 2px 7px; border-radius: 999px; font-size: 11px; }
      .good { background: rgba(40, 197, 143, .2); color: #7be5c1; }
      .watch { background: rgba(242, 184, 79, .2); color: #f8d593; }
      .risk { background: rgba(240, 111, 134, .2); color: #fab6c3; }
      .progress { margin-top: 8px; border: 1px solid #294066; height: 7px; border-radius: 999px; overflow: hidden; background: #0b1424; }
      .progress > div { height: 100%; background: linear-gradient(90deg, #3874df, #58aeff); }

      .activity-feed { border-top: 1px solid var(--line); padding: 11px 12px; background: rgba(7, 12, 22, 0.75); }
      .feed-item { font-size: 12px; color: var(--muted); margin: 5px 0; }
      .feed-item b { color: var(--text); }

      .right-rail { grid-column: 3; grid-row: 2 / 4; border-left: 1px solid var(--line); padding: 12px; overflow: auto; }
      .panel { border: 1px solid var(--line); background: var(--panel); border-radius: 10px; padding: 10px; margin-bottom: 10px; }
      .alert { border-left: 3px solid var(--warn); padding-left: 8px; margin: 7px 0; color: #f1d9a8; font-size: 13px; }

      .focus-layer {
        position: absolute;
        inset: 72px 338px 66px 246px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(6, 10, 18, .95);
        padding: 12px;
        opacity: 0;
        pointer-events: none;
        transform: scale(.96);
        transition: all 260ms ease;
      }
      .focus-layer.open { opacity: 1; pointer-events: auto; transform: scale(1); }
      .focus-grid { margin-top: 10px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 9px; }
      .focus-list-item { border: 1px solid var(--line); border-radius: 8px; padding: 8px; margin: 6px 0; cursor: pointer; background: #0f1a2d; }

      .detail-drawer {
        position: fixed;
        top: 0;
        right: 0;
        height: 100%;
        width: 430px;
        background: #0a1222;
        border-left: 1px solid var(--line);
        transform: translateX(100%);
        transition: transform 250ms ease;
        padding: 16px;
        z-index: 30;
      }
      .detail-drawer.open { transform: translateX(0); }
      .input { width: 100%; margin-top: 4px; margin-bottom: 8px; border: 1px solid #2a456c; background: #08111f; color: var(--text); border-radius: 8px; padding: 8px; }
      button { border: 0; background: var(--accent); color: white; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
      .ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); }
    </style>
  </head>
  <body>
    <div id="app" class="mission-control-layout"></div>
    <aside id="detailDrawer" class="detail-drawer"></aside>

    <script>
      const stageNames = ['Discovery', 'Audit', 'Automation', 'Testing', 'Implementation', 'Optimization'];
      const navItems = ['Dashboard', 'Leads', 'Deals', 'Clients', 'Engagements', 'Tasks', 'Finance', 'Knowledge', 'Settings'];
      const metrics = [
        { label: 'Active Leads', value: 31 },
        { label: 'Deals in Pipeline', value: 17 },
        { label: 'Active Engagements', value: 12 },
        { label: 'Overdue Tasks', value: 7 },
        { label: 'Unpaid Invoices', value: 4 }
      ];

      const engagements = [
        { id: 1, name: 'AI Readiness Audit', client: 'Immigration Firm', progress: 65, stage: 'Audit', owner: 'Turea', health: 'Good', milestone: 'Finalize process map' },
        { id: 2, name: 'Matter Intake Automation', client: 'Harper Legal', progress: 38, stage: 'Automation', owner: 'Mika', health: 'Watch', milestone: 'Integration checkpoint' },
        { id: 3, name: 'Onboarding Workflow Upgrade', client: 'Northstar Clinic', progress: 81, stage: 'Testing', owner: 'Ren', health: 'Good', milestone: 'UAT sign-off' },
        { id: 4, name: 'Finance Ops Visibility', client: 'Foundry Manufacturing', progress: 47, stage: 'Implementation', owner: 'Anya', health: 'Risk', milestone: 'Invoice reconciliation' }
      ];

      const alerts = [
        'Proposal awaiting approval · Harper Legal',
        'Client waiting response · Immigration Firm',
        'Overdue deliverable · Foundry Manufacturing',
        'Unpaid invoice · Northstar Clinic',
        'Stalled engagement · Finance Ops Visibility'
      ];

      const eventLog = [
        '10:32 AM — Discovery call completed',
        '10:45 AM — Client questionnaire received',
        '11:15 AM — Audit analysis started',
        '2:00 PM — Deliverable draft completed'
      ];

      let dragId = null;
      const app = document.getElementById('app');
      const drawer = document.getElementById('detailDrawer');

      function MetricCard(metric) {
        return `<article class="metric-card"><div class="label">${metric.label}</div><div class="value">${metric.value}</div></article>`;
      }
      function EngagementCard(item) {
        const healthClass = item.health === 'Good' ? 'good' : item.health === 'Watch' ? 'watch' : 'risk';
        return `
          <article class="engagement-card" draggable="true" data-id="${item.id}">
            <div class="row"><strong>${item.name}</strong><span class="health ${healthClass}">${item.health}</span></div>
            <div class="muted">Client: ${item.client}</div>
            <div class="row" style="margin-top:5px;"><span class="muted">Stage: ${item.stage}</span><span class="muted">Owner: ${item.owner}</span></div>
            <div class="progress"><div style="width:${item.progress}%"></div></div>
            <div class="row" style="margin-top:6px;"><span>${item.progress}%</span><span class="muted">Next: ${item.milestone}</span></div>
          </article>
        `;
      }
      function StageTimeline() {
        return stageNames.map(name => `<div class="stage-slot" data-stage="${name}">${name}</div>`).join('');
      }
      function AlertList() {
        return alerts.map(alert => `<div class="alert">${alert}</div>`).join('');
      }
      function ActivityFeed() {
        return eventLog.slice(0, 10).map(line => {
          const [time, msg] = line.split(' — ');
          return `<div class="feed-item"><b>${time}</b> — ${msg}</div>`;
        }).join('');
      }

      function render() {
        app.innerHTML = `
          <aside class="sidebar">
            <div class="brand">BIZDEEDZ MISSION CONTROL</div>
            ${navItems.map(n => `<div class="nav-link ${n === 'Dashboard' ? 'active' : ''}">${n}</div>`).join('')}
          </aside>

          <header class="top-timeline-bar">
            <div class="timeline-label">Engagement Stage Timeline</div>
            <div class="stage-track">${StageTimeline()}</div>
          </header>

          <main class="main-engagement-board">
            <section class="metric-grid">${metrics.map(MetricCard).join('')}</section>
            <section class="board-header">Company Operations View · Drag cards across stages to update lifecycle and auto-log events.</section>
            <section class="engagement-board">${engagements.map(EngagementCard).join('')}</section>
            <section class="activity-feed">
              <strong>Activity Feed</strong>
              ${ActivityFeed()}
            </section>
          </main>

          <aside class="right-rail">
            <section class="panel">
              <strong>Operational Alerts</strong>
              ${AlertList()}
            </section>
            <section class="panel">
              <strong>Leadership Visibility</strong>
              <div class="muted" style="margin-top:6px;">Critical blockers: 2</div>
              <div class="muted">Engagements with risk health: ${engagements.filter(e => e.health === 'Risk').length}</div>
              <div class="muted">Avg engagement progress: ${Math.round(engagements.reduce((a, e) => a + e.progress, 0) / engagements.length)}%</div>
            </section>
          </aside>

          <section id="focusLayer" class="focus-layer"></section>
        `;

        bindInteractions();
      }

      function bindInteractions() {
        document.querySelectorAll('.engagement-card').forEach(card => {
          card.addEventListener('click', () => openFocus(Number(card.dataset.id)));
          card.addEventListener('dragstart', () => dragId = Number(card.dataset.id));
        });

        document.querySelectorAll('.stage-slot').forEach(slot => {
          slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('drag-over'); });
          slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
          slot.addEventListener('drop', () => {
            slot.classList.remove('drag-over');
            const engagement = engagements.find(e => e.id === dragId);
            if (!engagement) return;
            engagement.stage = slot.dataset.stage;
            logEvent(`${engagement.name} moved to ${engagement.stage}`);
            render();
          });
        });
      }

      function openFocus(id) {
        const engagement = engagements.find(e => e.id === id);
        if (!engagement) return;
        logEvent(`Focus opened for ${engagement.name}`);
        const focus = document.getElementById('focusLayer');
        focus.innerHTML = `
          <div class="row">
            <h3 style="margin:0;">${engagement.name} · ${engagement.client}</h3>
            <button class="ghost" onclick="closeFocus()">Back to Company View</button>
          </div>
          <div class="muted">Owner: ${engagement.owner} · Stage: ${engagement.stage} · Health: ${engagement.health}</div>
          <div class="progress" style="margin-top:8px;"><div style="width:${engagement.progress}%"></div></div>

          <div class="focus-grid">
            <section class="panel">
              <strong>Milestones + Tasks + Events + Deliverables</strong>
              <div class="focus-list-item" onclick="openDetail('Milestone', 'Process map validation', 'Due: Tuesday')">Milestone · Process map validation</div>
              <div class="focus-list-item" onclick="openDetail('Task', 'Draft SOP automation rules', 'Assignee: ${engagement.owner}')">Task · Draft SOP automation rules</div>
              <div class="focus-list-item" onclick="openDetail('Event', 'Client alignment session', 'Start: 3:30 PM')">Event · Client alignment session</div>
              <div class="focus-list-item" onclick="openDetail('Deliverable', 'Audit findings deck', 'Status: In progress')">Deliverable · Audit findings deck</div>
            </section>
            <section class="panel">
              <strong>Finance Snapshot</strong>
              <div class="focus-list-item" onclick="openDetail('Finance Record', 'Invoice #4432', 'Amount: $8,500')">Finance Record · Invoice #4432 · $8,500</div>
              <div class="muted">Budget used: 72%</div>
              <div class="muted">Burned hours: 118 / 160</div>
            </section>
          </div>
        `;
        focus.classList.add('open');
      }

      function closeFocus() {
        const focus = document.getElementById('focusLayer');
        focus.classList.remove('open');
      }

      function DetailDrawer({type, title, meta}) {
        return `
          <div class="row"><h3 style="margin:0;">${type} Detail</h3><button class="ghost" onclick="closeDrawer()">Close</button></div>
          <p><strong>${title}</strong></p>
          <p class="muted">${meta}</p>
          <label>Editable Field<input class="input" value="${title}" /></label>
          <label>Notes<textarea class="input" rows="4">Capture context, blockers, owner updates, and approvals.</textarea></label>
          <label>Attachments<input class="input" value="upload://artifact.pdf" /></label>
          <label>Next Actions<input class="input" value="Assign owner, confirm date, notify leadership" /></label>
          <button onclick="saveDetail('${title}')">Save Changes</button>
        `;
      }

      function openDetail(type, title, meta) {
        logEvent(`${type} opened: ${title}`);
        drawer.innerHTML = DetailDrawer({type, title, meta});
        drawer.classList.add('open');
      }

      function saveDetail(title) {
        logEvent(`Detail updated: ${title}`);
        render();
      }

      function closeDrawer() {
        drawer.classList.remove('open');
      }

      function logEvent(message) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        eventLog.unshift(`${time} — ${message}`);
      }

      window.openDetail = openDetail;
      window.closeFocus = closeFocus;
      window.closeDrawer = closeDrawer;
      window.saveDetail = saveDetail;

      render();
    </script>
  </body>
</html>
